<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Orsu Enterprises</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-page">
    <div class="ambient"></div>
    <div class="noise"></div>
    <canvas id="confettiCanvas"></canvas>

    <div class="login-card fade-in" id="loginSection">
        <div class="login-brand">
            <img src="ciotx.png" class="mark-img" alt="CiotX">
            <h2>CiotX AI Security</h2>
            <div class="sub">Employee Portal</div>
        </div>

        <form id="loginForm">
            <div id="errorMessage" class="error-toast" style="display: none;">
                <span>⚠</span>
                <span id="errorText"></span>
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="vamsi@orsuenterprises.com" required placeholder="name@orsuenterprises.com">
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" value="qwerfdsa@789654" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-lg mt-2" id="submitBtn">Sign In</button>
        </form>

        <div class="login-footer">
            <a href="index.html">← Back to Labs</a>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
