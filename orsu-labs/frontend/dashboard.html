<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Portal — Orsu Enterprises</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/chatbot.css">
</head>
<body class="dashboard-page">
    <div class="ambient"></div>

    <header class="top-bar">
        <div class="bar-inner">
            <div class="bar-left">
                <img src="ciotx.png" class="mark-img" alt="CiotX" style="width: auto; margin-right: 0.5rem;">
                <div class="greeting" id="greetingArea">
                    <span>Welcome</span>
                </div>
            </div>
            <button id="logoutBtn" class="btn-danger">Logout</button>
        </div>
    </header>

    <div class="dash-body">
        <div class="chat-card">
            <div class="chat-head">
                <div class="chat-head-left">
                    <div class="bot-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </div>
                    <div>
                        <h3>Orsu HR Assistant</h3>
                        <div class="status">
                            <span class="live-dot"></span>
                            <span>Online</span>
                        </div>
                    </div>
                </div>
                <span class="tag">llm-powered</span>
            </div>

            <div class="chat-body" id="chatMessages">
                <div class="msg msg-ai">
                    <p>Hello! I'm the Orsu Enterprises HR Assistant. I can help you with:</p>
                    <ul>
                        <li>Checking your leave balance</li>
                        <li>Viewing your salary and department info</li>
                        <li>Submitting leave requests</li>
                    </ul>
                    <p>How can I assist you today?</p>
                </div>
            </div>

            <form id="chatForm" class="chat-foot">
                <input type="text" id="chatInput" placeholder="Ask HR Assistant..." required autocomplete="off">
                <button type="submit" class="send-btn" id="sendBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/chatbot.js"></script>
    <script>
        // Auth check
        if (!localStorage.getItem('token')) window.location.href = 'login.html';

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user_name');
            localStorage.removeItem('user_email');
            window.location.href = 'login.html';
        });

        // Time-based greeting
        (function setGreeting() {
            const name = localStorage.getItem('user_name') || 'Employee';
            const hour = new Date().getHours();
            let period = 'Good evening';
            if (hour < 12) period = 'Good morning';
            else if (hour < 17) period = 'Good afternoon';

            document.getElementById('greetingArea').innerHTML = `
                <span>${period}, <strong>${name}</strong></span>
                <span class="time-note">${new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</span>
            `;
        })();
    </script>
</body>
</html>
